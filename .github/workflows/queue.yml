name: Queue benchmarks

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: 'JSON array of cluster names (e.g. ["ozstar-nt", "ozstar"] )'
        required: true
        default: '["ozstar-nt", "ozstar"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO:  ${{ github.repository }}
  MILESTONE: "Benchmarks run ${{ github.run_number }}"  # use run_number for uniqueness
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      milestone_number: ${{ steps.milestone.outputs.milestone_number }}
    steps:
      - name: Create milestone
        id: milestone
        env:
          description: |
            **Workflow:** [${{ github.run_number }}](${{ env.RUN_URL }})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Params:** \`${{ github.event.inputs.param1 }}\`
        run: |
          MILESTONE=$(gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="${{ env.MILESTONE }}" \
            --field description="${{ env.description }}" )

          echo $MILESTONE | jq -r '.html_url'

          # Set the milestone number as an output for use in subsequent jobs
          echo milestone_number=$(echo $MILESTONE | jq -r '.number') >> $GITHUB_OUTPUT

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue for ${{ matrix.cluster }}
        run: |
          # Create issue body
          # Use jq for robust raw JSON construction
          issue_body=$(
            jq -n \
              --arg commit "${{ github.sha }}" \
              --arg cluster "${{ matrix.cluster }}" \
              --arg run_number "${{ github.run_number }}" \
              --arg param1 "${{ github.event.inputs.param1 }}" \
              '{
                commit: $commit,
                cluster: $cluster,
                run_number: $run_number,
                param1: $param1
              }'
          )

          MILESTONE_NUMBER=${{ needs.create-milestone.outputs.milestone_number }}

          ISSUE=$(gh api repos/${{ github.repository }}/issues \
            --method POST \
            --raw-field title="bench-run ${{ github.run_number }} [$(date +%F)]" \
            --raw-field body="$issue_body" \
            --field labels[]=benchmark-queue \
            --field labels[]=pending \
            --field labels[]="${{ matrix.cluster }}" \
            --field milestone="$MILESTONE_NUMBER"
          )

          gh issue comment $(echo $ISSUE | jq -r '.number') --body "${{ env.RUN_URL }}"
