name: Queue benchmarks

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: 'JSON array of cluster names (e.g. ["ozstar-nt", "ozstar"] )'
        required: true
        default: '["ozstar-nt", "ozstar"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO:  ${{ github.repository }}
  MILESTONE: "Benchmarks run ${{ github.run_number }}"  # use run_number for uniqueness
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_number }}

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create milestone
        env:
          description: |
            **Workflow:** [${{ github.run_number }}](${{ env.RUN_URL }})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Params:** \`${{ github.event.inputs.param1 }}\`
        run: |
          gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="${{ env.MILESTONE }}" \
            --field description="${{ env.description }}" \
            --jq '.html_url'

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue for ${{ matrix.cluster }}
        env:
          issue_body: |
            {
              "commit": "${{ github.sha }}",
              "cluster": "${{ matrix.cluster }}",
              "run_number": "${{ github.run_number }}",
              "run_url": "${{ env.RUN_URL }}",
              "param1": "${{ github.event.inputs.param1 }}"
            }

        run: |
          gh issue create \
            --title     "bench-run ${{ github.run_number }} [$(date +%F)]" \
            --body      "${{ toJson(env.issue_body) }}" \
            --label     benchmark-queue \
            --label     pending \
            --label     "${{ matrix.cluster }}" \
            --milestone "${{ env.MILESTONE }}"
