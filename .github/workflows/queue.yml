name: Queue benchmarks

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: "JSON array of cluster names (e.g. ozstar-nt,ozstar)"
        required: true
        default: '["ozstar-nt", "ozstar"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO:  ${{ github.repository }}
  TITLE: "Run-${{ github.run_id }}"  # use run_id for uniqueness
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create milestone
        env:
          DESCRIPTION: |
            **Trigger:** [${{ github.run_id }}](${RUN_URL})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Params:** \`${{ github.event.inputs.param1 }}\`
        run: |
          gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="$TITLE" \
            --field description="$DESCRIPTION" \
            --jq '.html_url'

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue for ${{ matrix.cluster }}
        env:
          issue_body: |
            {
              "commit": "${{ github.sha }}",
              "cluster": "${{ matrix.cluster }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "${RUN_URL}",
              "param1": "${{ github.event.inputs.param1 }}"
            }

        run: |
          # Create issue

          # Convert issue_body to JSON string for gh CLI
          BODY="${{ toJson(env.issue_body) }}"

          echo "Creating issue for $CLUSTER"

          gh issue create \
            --title     "$TITLE" \
            --body      "$BODY" \
            --label     pending \
            --label     "${{ matrix.cluster }}" \
            --milestone "$TITLE"
