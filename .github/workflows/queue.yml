name: JobQueue

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: 'JSON array of cluster names (e.g. ["ozstar", "cluster2"] )'
        required: true
        default: '["ozstar", "cluster2"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO:  ${{ github.repository }}
  MILESTONE: "Run ${{ github.run_number }}"  # use run_number for uniqueness
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
  QUEUE_LABEL: job-queue
  JOB_TITLE: job

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    outputs:
      milestone_number: ${{ steps.milestone.outputs.milestone_number }}
    steps:
      - name: Create milestone
        id: milestone
        env:
          # Untrusted input — kept as a shell variable, never spliced into
          # the run: script text via ${{ }}.
          PARAM1: ${{ github.event.inputs.param1 }}
          description: |
            **Workflow:** [${{ github.run_number }}](${{ env.RUN_URL }})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Params:** \`${{ github.event.inputs.param1 }}\`
        run: |
          MILESTONE_JSON=$(gh api "repos/${GH_REPO}/milestones" \
            --method POST \
            --field title="$MILESTONE" \
            --field description="$description")

          echo "$MILESTONE_JSON" | jq -r '.html_url'
          # Set the milestone number as an output for use in subsequent jobs
          echo "milestone_number=$(echo "$MILESTONE_JSON" | jq -r '.number')" >> "$GITHUB_OUTPUT"

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue
        env:
          # Untrusted inputs — kept as shell variables, quoted everywhere used.
          PARAM1: ${{ github.event.inputs.param1 }}
          CLUSTER: ${{ matrix.cluster }}
          MILESTONE_NUMBER: ${{ needs.create-milestone.outputs.milestone_number }}
        run: |
          # Create issue body
          # Use jq for robust raw JSON construction
          issue_body=$(
            jq -n \
              --arg commit "$GITHUB_SHA" \
              --arg run_number "$GITHUB_RUN_NUMBER" \
              --arg param1 "$PARAM1" \
              '{
                commit: $commit,
                run_number: $run_number,
                param1: $param1
              }'
          )

          ISSUE=$(gh api "repos/${GH_REPO}/issues" \
            --method POST \
            --raw-field title="${JOB_TITLE} - run ${GITHUB_RUN_NUMBER} [$(date +%F)]" \
            --raw-field body="$issue_body" \
            --field labels[]="$QUEUE_LABEL" \
            --field labels[]="$CLUSTER" \
            --field milestone="$MILESTONE_NUMBER"
          )

          gh issue comment "$(echo "$ISSUE" | jq -r '.number')" --body "Triggered by [run ${GITHUB_RUN_NUMBER}](${RUN_URL})"
          echo "$ISSUE" | jq -r '.html_url'
