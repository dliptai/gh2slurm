name: Queue benchmarks

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: "JSON array of cluster names (e.g. ozstar-nt,ozstar)"
        required: true
        default: '["ozstar-nt", "ozstar"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_REPO:  ${{ github.repository }}
  TITLE: "Run-${{ github.run_id }}"  # use run_id for uniqueness
  RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create milestone
        env:
          DESCRIPTION: |
            **Trigger:** [${{ github.run_id }}](${RUN_URL})
            **Commit:** [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            **Params:** \`${{ github.event.inputs.param1 }}\`
        run: |
          gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="$TITLE" \
            --field description="$DESCRIPTION" \
            --jq '.html_url'

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue for ${{ matrix.cluster }}
        env:
          RUN_URL: ${{ env.RUN_URL }}
          CLUSTER: ${{ matrix.cluster }}
        run: |
          # Create issue

          # Use JSON for issue body, so they can be parsed easily later
          ISSUE_BODY=$(jq -n \
            --arg sha     "${{ github.sha }}" \
            --arg cluster "$CLUSTER" \
            --arg run_id  "${{ github.run_id }}" \
            --arg run_url "$RUN_URL" \
            --arg p1      "$PARAM1" \
            '{commit:$sha, cluster:$cluster, run_id:$run_id, run_url:$run_url, param1:$p1}')

          echo "Creating issue for $CLUSTER"

          gh issue create \
            --title     "$TITLE" \
            --body      "$ISSUE_BODY" \
            --label     pending \
            --label     "$CLUSTER" \
            --milestone "$TITLE"
