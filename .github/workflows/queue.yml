# .github/workflows/queue-enqueue.yml
name: Enqueue benchmark

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: "Comma-separated cluster names (e.g. ozstar-nt,ozstar)"
        required: true
        default: "ozstar-nt,ozstar"
      param1:
        description: "First parameter"
        required: true

jobs:
  enqueue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      # Generate a bot token using the official GitHub action.
      # Remove this step and use GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} if using a PAT.
      # - uses: actions/create-github-app-token@v3
      #   id: app-token
      #   with:
      #     app-id: ${{ vars.APP_CLIENT_ID }}
      #     private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create milestone and fan out issues
        env:
          # GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
        run: |
          PARAM1="${{ github.event.inputs.param1 }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          # run_id in the title guarantees uniqueness — no duplicate milestone problem
          # gh issue create --milestone takes a name not a number, so keep both
          MILESTONE_TITLE="run ${{ github.run_id }}"

          # Plain Markdown description — for humans in the GitHub UI, not the daemon
          MILESTONE_DESCRIPTION="**Trigger:** [${{ github.run_id }}](${RUN_URL})"
          MILESTONE_DESCRIPTION+="**Commit:** \`[${{ github.sha }}](${SHA_URL})\`"$'\n'
          MILESTONE_DESCRIPTION+="**Params:** \`${PARAM1}\`"$'\n'

          MILESTONE_NUMBER=$(gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="$MILESTONE_TITLE" \
            --field description="$MILESTONE_DESCRIPTION" \
            --jq '.number')

          echo "Created milestone #$MILESTONE_NUMBER: $MILESTONE_TITLE"

          # Issue bodies are JSON so the daemon can parse them into PAYLOAD_* variables
          IFS=',' read -ra CLUSTERS <<< "${{ github.event.inputs.clusters }}"
          for CLUSTER in "${CLUSTERS[@]}"; do
            CLUSTER="${CLUSTER// /}"

            ISSUE_BODY=$(jq -n \
              --arg sha     "${{ github.sha }}" \
              --arg cluster "$CLUSTER" \
              --arg run_id  "${{ github.run_id }}" \
              --arg run_url "$RUN_URL" \
              --arg p1      "$PARAM1" \
              '{commit:$sha, cluster:$cluster, run_id:$run_id, run_url:$run_url, param1:$p1}')

            ISSUE_TITLE="run ${{ github.run_id }}"

            gh issue create \
              --title     "$ISSUE_TITLE" \
              --body      "$ISSUE_BODY" \
              --label     pending \
              --label     "$CLUSTER" \
              --milestone "$MILESTONE_TITLE"

            echo "Queued issue for $CLUSTER"
          done
