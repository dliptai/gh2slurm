# .github/workflows/queue-enqueue.yml
name: Enqueue benchmark

on:
  workflow_dispatch:
    inputs:
      clusters:
        description: "JSON array of cluster names (e.g. ozstar-nt,ozstar)"
        required: true
        default: '["ozstar-nt", "ozstar"]'
      param1:
        description: "First parameter"
        required: true
        default: "default value"

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create milestone and fan out issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA_URL: "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
          PARAM1: "${{ github.event.inputs.param1 }}"
          MILESTONE_TITLE: "run ${{ github.run_id }}"  # use run_id for uniqueness
        run: |
          # Create milestone and attach issues.

          # Plain Markdown description — for humans in the GitHub UI, not the daemon
          MILESTONE_DESCRIPTION="**Trigger:** [${{ github.run_id }}](${RUN_URL})"$'\n'
          MILESTONE_DESCRIPTION+="**Commit:** [${{ github.sha }}](${SHA_URL})"$'\n'
          MILESTONE_DESCRIPTION+="**Params:** \`${PARAM1}\`"$'\n'

          gh api repos/${{ github.repository }}/milestones \
            --method POST \
            --field title="$MILESTONE_TITLE" \
            --field description="$MILESTONE_DESCRIPTION" \
            --jq '.html_url'

  create-issues:
    needs: create-milestone
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cluster: ${{ fromJson(github.event.inputs.clusters) }}
    steps:
      - name: Create issue for cluster ${{ matrix.cluster }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:  ${{ github.repository }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          CLUSTER: ${{ matrix.cluster }}
          ISSUE_TITLE: "run ${{ github.run_id }}"
        run: |
          # Create issue

          # Use JSON for issue body, so they can be parsed easily later
          ISSUE_BODY=$(jq -n \
            --arg sha     "${{ github.sha }}" \
            --arg cluster "$CLUSTER" \
            --arg run_id  "${{ github.run_id }}" \
            --arg run_url "$RUN_URL" \
            --arg p1      "$PARAM1" \
            '{commit:$sha, cluster:$cluster, run_id:$run_id, run_url:$run_url, param1:$p1}')

          echo "Creating issue for $CLUSTER"

          gh issue create \
            --title     "$ISSUE_TITLE" \
            --body      "$ISSUE_BODY" \
            --label     pending \
            --label     "$CLUSTER" \
            --milestone "$MILESTONE_TITLE"
